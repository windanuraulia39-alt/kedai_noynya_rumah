<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UKK_WINDANA_PAKET C</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" type="text/css" href="assets/style.css">

</head>
<body>
    <nav class="navbar navbar-expand-lg sticky-top bg-success"> 
         <div class="container">
            <a class="navbar-brand text-white" href="index.html">
            Kedai Nyonya Rumah
            </a>

            <!-- Button Hamburger -->
             <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
             </button>

            <!-- Bagian Menu -->
            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="navbar-nav ms-auto">
                    <a class="nav-link text-white" href="index.html">Beranda</a>
                    <a class="nav-link text-white" href="index.html">Tentang</a>
                    <a class="nav-link text-white" href="index.html">Daftar Menu</a>
                    <a class="nav-link text-white" href="kontak">Kontak</a>
                   </div>
            </div>
        </div>
    </nav>

    <section class="login-section d-flex align-items-center">
        <div class="container">
            <div class="row justify-content-center align-items-center">

            <!-- FORM -->
                <div class="col-md-4 py-5">
                    <div class="login-card p-4 shadow">
                     <h3 class="text-center mb-4">Login</h3>

                        <form id="formLogin" onsubmit="login(event)">
                            <div class="mb-3">
                                <label>Username</label>
                                <input type="text" id="username" class="form-control">
                            </div>

                            <div class="mb-3">
                                <label>Password</label>
                                <input type="password" id="password" class="form-control">
                            </div>

                            <div class="d-flex justify-content-center">
                                <button type="submit" class="btn btn-primary">Login</button>
                            </div>

                            <p class="text-center mt-3">
                                Belum punya akun? <a href="register.html">Klik disini</a>
                            </p>
                        
                       
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>



     <footer class="footer bg-success text-white py-3 text-center">
    <p class="mb-0">&copy; 2026 Kedai Nyonya Rumah</p>
</footer>

<script src="js/bootstrap.bundle.min.js"></script>

<script>
    function login(event){

event.preventDefault()

let username = document.getElementById("username").value.trim()
let password = document.getElementById("password").value.trim()

// validasi kosong
if(!username || !password){
    alert("username & Password must be filled in")
    return
}

// ambil akun
let akun = JSON.parse(localStorage.getItem("akun")) || []

// cari user
let user = akun.find(u =>
    u.username === username && u.password === password
)

if(!user){
    alert("Incorrect username or Password")
    return
}

// simpan session login
localStorage.setItem("userLogin", JSON.stringify(user))

alert("Login successful")

//pindahin ke halaman dashboard user
window.location.href = "user.html"
}
</script>
</body>
</html>
